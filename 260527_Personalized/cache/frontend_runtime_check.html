<!doctype html>
<meta charset="utf-8">
<title>frontend runtime check</title>
<pre id="out">pending</pre>
<iframe id="mobile" src="../frontend/index.html" style="width:390px;height:1100px;border:0"></iframe>
<iframe id="desktop" src="../frontend/index.html" style="width:1440px;height:1100px;border:0"></iframe>
<script>
  const out = document.getElementById("out");
  const frames = [
    ["mobile", document.getElementById("mobile")],
    ["desktop", document.getElementById("desktop")],
  ];

  function inspect(name, frame) {
    const doc = frame.contentDocument;
    const firstCitation = doc.querySelector(".citation-ref");
    firstCitation?.click();
    const agentTab = doc.querySelector('[data-panel="agent"]');
    agentTab?.click();
    return {
      name,
      clientWidth: doc.documentElement.clientWidth,
      scrollWidth: doc.documentElement.scrollWidth,
      hasTitle: /个性化大语言模型|Personalized LLM/.test(doc.body.innerText),
      hasAbstract: /摘要|Abstract/.test(doc.body.innerText),
      referenceCards: doc.querySelectorAll(".reference-card").length,
      selectedPaperTitle: doc.querySelector("#paper-panel h3")?.innerText || "",
      agentPanelActive: doc.querySelector("#agent-panel.panel-body.active") !== null,
      agentNodes: doc.querySelectorAll(".agent-node").length,
    };
  }

  Promise.all(frames.map(([, frame]) => new Promise((resolve) => {
    frame.addEventListener("load", () => setTimeout(resolve, 1200), { once: true });
  }))).then(() => {
    out.textContent = JSON.stringify(frames.map(([name, frame]) => inspect(name, frame)), null, 2);
  });
</script>
